name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Build apps and run sanitized tests
        run: ./build.sh all -t Debug
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Build benchmarks (Release / -O3)
        run: ./build.sh modbus_bench -t Release

      - name: Run benchmarks
        run: |
          mkdir -p artifacts
          ./out/Release/modbus_bench \
            --benchmark_min_time=0.05s \
            --benchmark_format=json \
            --benchmark_out=artifacts/benchmarks.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: artifacts/benchmarks.json
